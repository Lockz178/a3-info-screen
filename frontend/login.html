<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A3 Info Screen &mdash; Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="dash-body">

  <main class="login-wrap">
    <div class="login-card">

      <div class="dash-brand login-brand">
        <svg class="dash-brand__icon" width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <line x1="8" y1="21" x2="16" y2="21"/>
          <line x1="12" y1="17" x2="12" y2="21"/>
        </svg>
        <div>
          <span class="dash-brand__title">A3 Info Screen</span>
          <span class="dash-brand__sub">Corridor Display Dashboard</span>
        </div>
      </div>

      <form id="loginForm" class="login-form" novalidate>
        <label class="login-label" for="passwordInput">Password</label>
        <div class="login-input-wrap">
          <input
            class="login-input"
            type="password"
            id="passwordInput"
            name="password"
            autocomplete="current-password"
            placeholder="Enter dashboard password"
            required
          />
          <button type="button" id="togglePassword" class="login-eye" aria-label="Show password">
            <svg class="eye-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" hidden>
              <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg class="eye-closed" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-6.5 0-10-7-10-7a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c6.5 0 10 7 10 7a18.5 18.5 0 0 1-2.16 3.19"/>
              <path d="M1 1l22 22"/>
            </svg>
          </button>
        </div>
        <div id="capsWarning" class="login-caps" hidden>⚠️ Caps Lock is on</div>
        <label class="login-remember">
          <input type="checkbox" id="rememberInput" />
          <span>Remember me on this device</span>
        </label>
        <div id="loginError" class="login-error" hidden></div>
        <button type="submit" class="button button--upload login-btn">
          <div class="wave"></div>
          <div class="wave"></div>
          <div class="wave"></div>
          <div class="wave"></div>
          <div class="fish"></div>
          <div class="bubble"></div>
          <div class="bubble"></div>
          <div class="bubble"></div>
          <div class="bubble"></div>
          <span class="button__text">Sign in</span>
        </button>
      </form>

    </div>
  </main>

  <script>
    const form = document.getElementById("loginForm");
    const errorEl = document.getElementById("loginError");

    // Eye toggle: switch the password field between hidden and visible.
    const passwordInput = document.getElementById("passwordInput");
    const toggleBtn = document.getElementById("togglePassword");
    const eyeOpen = toggleBtn.querySelector(".eye-open");
    const eyeClosed = toggleBtn.querySelector(".eye-closed");
    toggleBtn.addEventListener("click", () => {
      const show = passwordInput.type === "password";
      passwordInput.type = show ? "text" : "password";
      // Open eye when the password is visible, closed (slashed) eye when hidden.
      eyeOpen.hidden = !show;
      eyeClosed.hidden = show;
      toggleBtn.setAttribute("aria-label", show ? "Hide password" : "Show password");
      // Replay the pop animation on whichever icon is now shown.
      const icon = show ? eyeOpen : eyeClosed;
      icon.classList.remove("eye-anim");
      void icon.offsetWidth;
      icon.classList.add("eye-anim");
      passwordInput.focus();
    });

    // Caps Lock warning: show whenever Caps Lock is active while typing.
    const capsWarning = document.getElementById("capsWarning");
    function checkCaps(e) {
      if (typeof e.getModifierState === "function") {
        capsWarning.hidden = !e.getModifierState("CapsLock");
      }
    }
    passwordInput.addEventListener("keydown", checkCaps);
    passwordInput.addEventListener("keyup", checkCaps);
    passwordInput.addEventListener("blur", () => { capsWarning.hidden = true; });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorEl.hidden = true;
      const password = document.getElementById("passwordInput").value;
      const remember = document.getElementById("rememberInput").checked;
      try {
        const res = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password, remember }),
        });
        if (res.ok) {
          window.location.href = "/dashboard.html";
        } else {
          const data = await res.json().catch(() => ({}));
          errorEl.textContent = data.error || "Incorrect password.";
          errorEl.hidden = false;
        }
      } catch {
        errorEl.textContent = "Could not reach the server. Please try again.";
        errorEl.hidden = false;
      }
    });
  </script>

</body>
</html>
