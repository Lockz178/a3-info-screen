<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A3 Info Screen</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="screen">
    <img src="logo_TAMK.png" class="top-left-logo" alt="TAMK logo">
    <section class="media-area" id="mediaArea">
      <div class="placeholder">
        <h1>A3 Info Screen</h1>
        <p>No media uploaded yet.</p>
        <p class="small-text">Upload images or videos from the dashboard.</p>
      </div>
    </section>

    <img id="qrCode" class="qr-code" src="" alt="QR Code" hidden />

    <footer class="bottom-bar">
      <span id="clock">Loading time...</span>
    </footer>

    <div id="alertOverlay" class="alert-overlay" hidden>
      <div class="alert-overlay__text" id="alertText"></div>
    </div>
  </main>

  <script src="script.js"></script>
</body>

</html>
