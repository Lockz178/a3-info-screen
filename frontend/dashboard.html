<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A3 Info Screen &mdash; Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="dash-body">

  <header class="dash-header">
    <div class="dash-brand">
      <svg class="dash-brand__icon" width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="3" width="20" height="14" rx="2"/>
        <line x1="8" y1="21" x2="16" y2="21"/>
        <line x1="12" y1="17" x2="12" y2="21"/>
      </svg>
      <div>
        <span class="dash-brand__title">A3 Info Screen</span>
        <span class="dash-brand__sub">Corridor Display Dashboard</span>
      </div>
    </div>
    <div class="dash-header-actions">
      <a href="/" class="dash-view-link">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        <span>View Screen</span>
      </a>
      <button id="logoutBtn" class="dash-logout-btn" hidden>
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Sign out</span>
      </button>
    </div>
  </header>

  <main class="dash-main">

    <section class="dash-card">
      <div class="dash-card__header">
        <div>
          <h2 class="dash-card__title">Upload Media</h2>
          <p class="dash-card__desc">JPG, PNG, MP4 or MOV &mdash; max 100&nbsp;MB</p>
        </div>
      </div>

      <form id="uploadForm" novalidate>
        <input type="file" id="mediaFile" name="media" accept=".jpg,.jpeg,.png,.mp4,.mov" aria-hidden="true" tabindex="-1" />

        <div class="drop-zone" id="dropZone" role="button" tabindex="0" aria-label="File upload area. Click or drag files here.">
          <div id="dropIdle">
            <svg class="drop-zone__icon" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="16 16 12 12 8 16"/>
              <line x1="12" y1="12" x2="12" y2="21"/>
              <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
            </svg>
            <p class="drop-zone__text">Drag &amp; drop files here</p>
            <p class="drop-zone__hint">or <span class="drop-zone__browse">click to browse</span></p>
          </div>
          <div id="dropSelected" hidden>
            <div class="file-preview" id="filePreview"></div>
          </div>
        </div>

        <div id="durationRow" class="slider-row" hidden>
          <div class="slider-row__labels">
            <span>Shows for</span>
            <strong><span id="videoDurationValue">60</span>s</strong>
          </div>
          <input type="range" id="videoDurationSlider" min="5" max="60" value="60" />
          <div class="slider-row__ticks"><span>5s</span><span>60s</span></div>
        </div>

        <button type="submit" class="button button--upload" id="uploadBtn">
          <div class="wave"></div>
          <div class="wave"></div>
          <div class="wave"></div>
          <div class="wave"></div>
          <div class="fish"></div>
          <div class="bubble"></div>
          <div class="bubble"></div>
          <div class="bubble"></div>
          <div class="bubble"></div>
          <span class="button__text">Upload</span>
        </button>
      </form>

      <div id="uploadMessage" class="upload-msg" role="status" aria-live="polite"></div>
    </section>

    <section class="dash-card">
      <div class="dash-card__header">
        <div>
          <h2 class="dash-card__title">Media Library</h2>
          <p class="dash-card__desc">Files currently shown on the corridor screen</p>
        </div>
        <span class="file-count-badge" id="fileCount" hidden></span>
      </div>
      <ul id="fileList" class="file-list">
        <li class="file-list__empty">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
            <polyline points="13 2 13 9 20 9"/>
          </svg>
          <span>No files uploaded yet</span>
        </li>
      </ul>
    </section>

  </main>

  <script src="dashboard.js"></script>
</body>
</html>
